name: Publish Container Images To GHCR

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ghcr-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-images:
    name: Publish / ${{ matrix.image_name }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        include:
          - image_name: device-service
            dockerfile: services/device-service/Dockerfile
            context: .
            docker_target: ""
          - image_name: energy-service
            dockerfile: services/energy-service/Dockerfile
            context: .
            docker_target: ""
          - image_name: data-service
            dockerfile: services/data-service/Dockerfile
            context: .
            docker_target: ""
          - image_name: rule-engine-service
            dockerfile: services/rule-engine-service/Dockerfile
            context: .
            docker_target: ""
          - image_name: analytics-api
            dockerfile: services/analytics-service/Dockerfile
            context: .
            docker_target: api
          - image_name: analytics-worker
            dockerfile: services/analytics-service/Dockerfile
            context: .
            docker_target: worker
          - image_name: data-export-service
            dockerfile: services/data-export-service/Dockerfile
            context: .
            docker_target: ""
          - image_name: reporting-service
            dockerfile: services/reporting-service/Dockerfile
            context: .
            docker_target: ""
          - image_name: waste-analysis-service
            dockerfile: services/waste-analysis-service/Dockerfile
            context: .
            docker_target: ""
          - image_name: copilot-service
            dockerfile: services/copilot-service/Dockerfile
            context: .
            docker_target: ""
          - image_name: auth-service
            dockerfile: services/auth-service/Dockerfile
            context: .
            docker_target: ""
          - image_name: ui-web
            dockerfile: ui-web/Dockerfile
            context: ./ui-web
            docker_target: ""

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image repository
        id: image
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          repo="${GITHUB_REPOSITORY#*/}"
          repo="${repo,,}"
          echo "repo=ghcr.io/${owner}/${repo}-${{ matrix.image_name }}" >> "${GITHUB_OUTPUT}"

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.repo }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
          labels: |
            org.opencontainers.image.title=${{ matrix.image_name }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push image
        if: ${{ matrix.docker_target == '' }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          provenance: false
          sbom: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build and push targeted image
        if: ${{ matrix.docker_target != '' }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.docker_target }}
          push: true
          provenance: false
          sbom: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
