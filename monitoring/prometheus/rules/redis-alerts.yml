groups:
  - name: redis-health
    rules:
      - alert: RedisDown
        expr: redis_up == 0
        for: 1m
        labels:
          severity: critical
          service: redis
        annotations:
          summary: "Redis exporter cannot reach Redis"
          description: "Redis at {{ $labels.instance }} has been unreachable for over 1 minute."

      - alert: RedisMemoryHigh
        expr: redis_memory_max_bytes > 0 and ((redis_memory_used_bytes / redis_memory_max_bytes) * 100) > 80
        for: 5m
        labels:
          severity: warning
          service: redis
        annotations:
          summary: "Redis memory usage high"
          description: "Redis memory usage is {{ $value | printf \"%.1f\" }}% of configured maxmemory (>80%) on {{ $labels.instance }} for 5 minutes."

      - alert: RedisMemoryCritical
        expr: redis_memory_max_bytes > 0 and ((redis_memory_used_bytes / redis_memory_max_bytes) * 100) > 90
        for: 2m
        labels:
          severity: critical
          service: redis
        annotations:
          summary: "Redis memory usage critical"
          description: "Redis memory usage is {{ $value | printf \"%.1f\" }}% of configured maxmemory (>90%) on {{ $labels.instance }} for 2 minutes. With noeviction, new writes may start failing soon."
