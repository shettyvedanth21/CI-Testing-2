groups:
  - name: endpoint-health
    rules:
      - alert: EndpointProbeFailure
        expr: probe_success == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Endpoint probe failing"
          description: "Probe to {{ $labels.instance }} has been failing for 2 minutes."

      - alert: EndpointSlowResponse
        expr: probe_duration_seconds > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Endpoint responding slowly"
          description: "Probe to {{ $labels.instance }} took {{ $value | printf \"%.2f\" }}s (>5s) for 5 minutes."

      - alert: ServiceUnavailable
        expr: avg_over_time(probe_success[10m]) < 0.5
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Service unavailable for sustained window"
          description: "{{ $labels.instance }} was reachable less than 50% of the time over the last 10 minutes."
