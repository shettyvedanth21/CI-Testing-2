global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: device-service
    metrics_path: /metrics
    static_configs:
      - targets: ["device-service:8000"]

  - job_name: data-service
    metrics_path: /metrics
    static_configs:
      - targets: ["data-service:8081"]

  - job_name: analytics-service
    metrics_path: /metrics
    static_configs:
      - targets: ["analytics-service:8003"]

  - job_name: reporting-service
    metrics_path: /metrics
    static_configs:
      - targets: ["reporting-service:8085"]

  - job_name: waste-analysis-service
    metrics_path: /metrics
    static_configs:
      - targets: ["waste-analysis-service:8087"]

  - job_name: rule-engine-service
    metrics_path: /metrics
    static_configs:
      - targets: ["rule-engine-service:8002"]

  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: redis-exporter
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: blackbox-http
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://ui-web:3000
          - http://auth-service:8090/health
          - http://device-service:8000/health
          - http://energy-service:8010/health
          - http://data-service:8081/health
          - http://analytics-service:8003/health
          - http://reporting-service:8085/health
          - http://waste-analysis-service:8087/health
          - http://rule-engine-service:8002/health
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
      - source_labels: [__param_target]
        regex: "https?://([^/]+)(/.*)?"
        replacement: "${1}"
        target_label: target_host
