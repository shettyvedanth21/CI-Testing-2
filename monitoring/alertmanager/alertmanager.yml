global:
  resolve_timeout: 5m
  smtp_smarthost: "__ALERT_SMTP_HOST__:__ALERT_SMTP_PORT__"
  smtp_from: "__ALERT_SMTP_FROM__"
  smtp_auth_username: "__ALERT_SMTP_USERNAME__"
  smtp_auth_password: "__ALERT_SMTP_PASSWORD__"
  smtp_require_tls: true

route:
  receiver: email-default
  group_by: ["alertname", "service"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - match:
        severity: critical
      receiver: email-default
      repeat_interval: 30m

receivers:
  - name: email-default
    email_configs:
      - to: "__ALERT_SMTP_TO__"
        send_resolved: true
        headers:
          Subject: "[Shivex {{ .Status | toUpper }}] {{ .CommonLabels.alertname }} ({{ .CommonLabels.severity }})"
