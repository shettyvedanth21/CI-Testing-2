# Debug overlay for debugger mode. Use together with docker-compose.yml + docker-compose.local.yml:
#   docker compose --env-file .env.local \
#     -f docker-compose.yml \
#     -f docker-compose.local.yml \
#     -f docker-compose.debug.yml \
#     up -d --build
#
# This file MUST NOT be used in production or committed to .env files.
# It sets DEBUGPY_ENABLE=true and exposes debug ports for IDE attach.
# Without this overlay, debugpy is completely disabled in all containers.

services:
  auth-service:
    environment:
      DEBUGPY_ENABLE: "true"
      DEBUGPY_HOST: "0.0.0.0"
      DEBUGPY_PORT: "5671"
      DEBUGPY_WAIT_FOR_CLIENT: "false"
    ports:
      - "5671:5671"

