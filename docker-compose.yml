      LOCAL_BOOTSTRAP_TENANT_ID: "${LOCAL_BOOTSTRAP_TENANT_ID:-SH00000001}"
      LOCAL_BOOTSTRAP_TENANT_NAME: "${LOCAL_BOOTSTRAP_TENANT_NAME:-Shivex Demo Tenant}"
      LOCAL_BOOTSTRAP_TENANT_SLUG: "${LOCAL_BOOTSTRAP_TENANT_SLUG:-shivex-demo}"
      LOCAL_BOOTSTRAP_PLANT_ID: "${LOCAL_BOOTSTRAP_PLANT_ID:-demo-plant}"
      LOCAL_BOOTSTRAP_PLANT_NAME: "${LOCAL_BOOTSTRAP_PLANT_NAME:-Demo Plant}"
      LOCAL_BOOTSTRAP_PLANT_LOCATION: "${LOCAL_BOOTSTRAP_PLANT_LOCATION:-Local Demo Plant}"
      LOCAL_BOOTSTRAP_PLANT_TIMEZONE: "${LOCAL_BOOTSTRAP_PLANT_TIMEZONE:-Asia/Kolkata}"
      LOCAL_BOOTSTRAP_PREMIUM_FEATURES: "${LOCAL_BOOTSTRAP_PREMIUM_FEATURES:-reports,waste_analysis,copilot,analytics}"
      INVITE_TOKEN_EXPIRE_MINUTES: "30"
      PASSWORD_RESET_EXPIRE_MINUTES: "30"
      LOGIN_RATE_LIMIT: "${LOGIN_RATE_LIMIT:-120/minute}"
      PASSWORD_FORGOT_RATE_LIMIT: "${PASSWORD_FORGOT_RATE_LIMIT:-30/minute}"
      INVITATION_ACCEPT_RATE_LIMIT: "${INVITATION_ACCEPT_RATE_LIMIT:-30/minute}"
      SERVICE_HOST: "0.0.0.0"
      SERVICE_PORT: "8090"
      UVICORN_WORKERS: "${AUTH_SERVICE_UVICORN_WORKERS:-1}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      ENVIRONMENT: "${ENVIRONMENT:-development}"
      SQLALCHEMY_ECHO: "${SQLALCHEMY_ECHO:-false}"
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    networks:
      - energy-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  ui-web:
    image: ghcr.io/${GHCR_OWNER_LOWER:-cittagent}/${GHCR_REPO_LOWER:-shivex-main-1}-ui-web:${UI_WEB_IMAGE_TAG:-${APP_IMAGE_TAG:-main}}
    container_name: ui-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - device-service
      - data-service
      - rule-engine-service
      - analytics-service
      - data-export-service
      - waste-analysis-service
      - copilot-service
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(r=>{process.exit(r.ok?0:1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - energy-net
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://shivex.ai}

  telemetry-simulator:
    build: ./tools/device-simulator
    container_name: telemetry-simulator
    environment:
      - DEVICE_ID=${DEVICE_ID:-COMPRESSOR-001}
      - TENANT_ID=${TENANT_ID:-SH00000001}
      - MQTT_BROKER_HOST=emqx
      - MQTT_BROKER_PORT=1883
      - DEVICE_SERVICE_URL=http://device-service:8000
      - AUTH_SERVICE_URL=http://auth-service:8090
      - MQTT_CREDENTIAL_BOOTSTRAP_EMAIL=${BOOTSTRAP_SUPER_ADMIN_EMAIL:-}
      - MQTT_CREDENTIAL_BOOTSTRAP_PASSWORD=${BOOTSTRAP_SUPER_ADMIN_PASSWORD:-}
    depends_on:
      emqx:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      device-service:
        condition: service_healthy
      data-service:
        condition: service_healthy
    networks:
      - energy-net
    profiles:
      - demo
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  prometheus:
    image: prom/prometheus:v2.53.1
    container_name: prometheus
    profiles:
      - monitoring
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - device-service
    networks:
      - energy-net
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    profiles:
      - monitoring
    environment:
      ALERTMANAGER_EXTERNAL_URL: ${ALERTMANAGER_EXTERNAL_URL:-http://localhost:9093}
      ALERT_SMTP_HOST: ${ALERT_SMTP_HOST:-${EMAIL_SMTP_HOST:-${SMTP_SERVER:-smtp.gmail.com}}}
      ALERT_SMTP_PORT: ${ALERT_SMTP_PORT:-${EMAIL_SMTP_PORT:-587}}
      ALERT_SMTP_FROM: ${ALERT_SMTP_FROM:-${EMAIL_FROM_ADDRESS:-${EMAIL_SENDER:-alerts@shivex.ai}}}
      ALERT_SMTP_USERNAME: ${ALERT_SMTP_USERNAME:-${EMAIL_SMTP_USERNAME:-${EMAIL_SENDER:-}}}
      ALERT_SMTP_PASSWORD: ${ALERT_SMTP_PASSWORD:-${EMAIL_SMTP_PASSWORD:-${EMAIL_PASSWORD:-}}}
      ALERT_SMTP_TO: ${ALERT_SMTP_TO:-ops@shivex.ai}
    entrypoint:
      - /bin/sh
      - -c
      - |
        sed \
          -e "s|__ALERT_SMTP_HOST__|$$ALERT_SMTP_HOST|g" \
          -e "s|__ALERT_SMTP_PORT__|$$ALERT_SMTP_PORT|g" \
          -e "s|__ALERT_SMTP_FROM__|$$ALERT_SMTP_FROM|g" \
          -e "s|__ALERT_SMTP_USERNAME__|$$ALERT_SMTP_USERNAME|g" \
          -e "s|__ALERT_SMTP_PASSWORD__|$$ALERT_SMTP_PASSWORD|g" \
          -e "s|__ALERT_SMTP_TO__|$$ALERT_SMTP_TO|g" \
          /etc/alertmanager/alertmanager.yml > /tmp/alertmanager.yml \
          && /bin/alertmanager --config.file=/tmp/alertmanager.yml \
             --web.external-url=$$ALERTMANAGER_EXTERNAL_URL \
             --storage.path=/alertmanager
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    ports:
      - "9093:9093"
    networks:
      - energy-net
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 32M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  grafana:
    image: grafana/grafana:11.1.4
    container_name: grafana
    profiles:
      - monitoring
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin123}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - energy-net
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  node-exporter:
    image: prom/node-exporter:v1.8.0
    container_name: node-exporter
    profiles:
      - monitoring
    command:
      - "--path.rootfs=/host"
      - "--path.procfs=/hostproc"
      - "--path.sysfs=/hostsys"
    volumes:
      - /:/host:ro
      - /proc:/hostproc:ro
      - /sys:/hostsys:ro
    expose:
      - "9100"
    networks:
      - energy-net
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 32M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis-exporter:
    image: oliver006/redis_exporter:v1.67.0
    container_name: redis-exporter
    profiles:
      - monitoring
    environment:
      REDIS_ADDR: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - energy-net
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 32M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    container_name: blackbox-exporter
    profiles:
      - monitoring
    volumes:
      - ./monitoring/blackbox-exporter/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    expose:
      - "9115"
    networks:
      - energy-net
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 16M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  energy-net:
    driver: bridge

volumes:
  influxdb_data:
  emqx_data:
  emqx_log:
  prometheus_data:
  alertmanager_data:
  grafana_data:
