# Base stack for production-like deployments. Local-only infrastructure such as
# Docker MySQL and MinIO lives in docker-compose.local.yml and should be loaded
# explicitly for local development.
services:
  influxdb:
    image: influxdb:2.7-alpine
    container_name: influxdb
    restart: unless-stopped
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_CLI_CONFIG_NAME: energy-platform
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: admin123
      DOCKER_INFLUXDB_INIT_ORG: energy-org
      DOCKER_INFLUXDB_INIT_BUCKET: telemetry
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: energy-token
      INFLUXD_HTTP_BIND_ADDRESS: :8086
    expose:
      - "8086"
    networks:
      - energy-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: analytics_redis
    restart: unless-stopped
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--maxmemory",
        "${REDIS_MAXMEMORY:-1gb}",
        "--maxmemory-policy",
        "${REDIS_MAXMEMORY_POLICY:-noeviction}",
        "--requirepass",
        "${REDIS_PASSWORD:-}",
      ]
    expose:
      - "6379"
    networks:
      - energy-net
    healthcheck:
      test: ["CMD", "sh", "-c", "REDISCLI_AUTH=$$REDIS_PASSWORD redis-cli ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  emqx:
    image: emqx/emqx:5.3.0
    container_name: emqx
    hostname: emqx.local
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "8083:8083"
      - "8084:8084"
      - "18083:18083"
    networks:
      energy-net:
        aliases:
          - emqx.local
    environment:
      # EMQX health checks rely on the Erlang node name matching a resolvable hostname.
      EMQX_NODE__NAME: emqx@emqx.local
      EMQX_HOST: emqx.local
      EMQX_LOADED_PLUGINS: "emqx_retained,emqx_rule_engine,emqx_dashboard"
      EMQX_AUTH_MYSQL_HOST: "${EMQX_AUTH_MYSQL_HOST:-}"
      EMQX_AUTH_MYSQL_PORT: "${EMQX_AUTH_MYSQL_PORT:-}"
      EMQX_AUTH_MYSQL_DATABASE: "${EMQX_AUTH_MYSQL_DATABASE:-}"
      EMQX_AUTH_MYSQL_USERNAME: "${EMQX_AUTH_MYSQL_USERNAME:-}"
      EMQX_AUTH_MYSQL_PASSWORD: "${EMQX_AUTH_MYSQL_PASSWORD:-}"
    volumes:
      - emqx_data:/opt/emqx/data
      - emqx_log:/opt/emqx/log
      - ${EMQX_PRODUCTION_CONFIG_PATH:-./ops/emqx/production.base.hocon}:/opt/emqx/etc/emqx.conf:ro
    healthcheck:
      test: ["CMD", "/opt/emqx/bin/emqx_ctl", "status"]
      interval: 10s
      timeout: 15s
      retries: 12
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  emqx-auth-bootstrap:
    image: curlimages/curl:8.7.1
    container_name: emqx-auth-bootstrap
    restart: "no"
    depends_on:
      emqx:
        condition: service_healthy
    environment:
      EMQX_DASHBOARD_USERNAME: "${EMQX_DASHBOARD_USERNAME:-admin}"
      EMQX_DASHBOARD_PASSWORD: "${EMQX_DASHBOARD_PASSWORD:-public}"
      MQTT_PASSWORD: "${MQTT_PASSWORD:-local-dev-data-service-password}"
    command:
      [
        "sh",
        "-c",
        "set -eu; \
        until curl -fsS http://emqx:18083/api/v5/status >/dev/null 2>&1; do sleep 2; done; \
        TOKEN=$$(curl -fsS -H 'Content-Type: application/json' \
          -d '{\"username\":\"'\"$$EMQX_DASHBOARD_USERNAME\"'\",\"password\":\"'\"$$EMQX_DASHBOARD_PASSWORD\"'\"}' \
          http://emqx:18083/api/v5/login | sed -n 's/.*\"token\":\"\\([^\"]*\\)\".*/\\1/p'); \
        test -n \"$$TOKEN\"; \
        CREATE_BODY=$$(printf '{\"user_id\":\"internal:data-service\",\"password\":\"%s\",\"is_superuser\":false}' \"$$MQTT_PASSWORD\"); \
        UPDATE_BODY=$$(printf '{\"password\":\"%s\",\"is_superuser\":false}' \"$$MQTT_PASSWORD\"); \
        curl -fsS -H \"Authorization: Bearer $$TOKEN\" -H 'Content-Type: application/json' \
          -X POST \
          -d \"$$CREATE_BODY\" \
          'http://emqx:18083/api/v5/authentication/password_based%3Abuilt_in_database/users' >/dev/null \
          || curl -fsS -H \"Authorization: Bearer $$TOKEN\" -H 'Content-Type: application/json' \
            -X PUT \
            -d \"$$UPDATE_BODY\" \
            'http://emqx:18083/api/v5/authentication/password_based%3Abuilt_in_database/users/internal%3Adata-service' >/dev/null"
      ]
    networks:
      - energy-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  device-service:
    image: ghcr.io/${GHCR_OWNER_LOWER:-cittagent}/${GHCR_REPO_LOWER:-shivex-main-1}-device-service:${DEVICE_SERVICE_IMAGE_TAG:-${APP_IMAGE_TAG:-main}}
    container_name: device-service
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - LOG_LEVEL=INFO
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - DEVICE_SERVICE_RUNTIME=api
      - DEVICE_SERVICE_ENABLE_FLEET_STREAM=true
      - DEVICE_SERVICE_RUN_STARTUP_MAINTENANCE=false
      - DEVICE_SERVICE_RUN_EMBEDDED_SCHEDULERS=false
      - UVICORN_WORKERS=${DEVICE_SERVICE_UVICORN_WORKERS:-1}
      - DATA_SERVICE_BASE_URL=http://data-service:8081
      - RULE_ENGINE_SERVICE_BASE_URL=http://rule-engine-service:8002
      - REPORTING_SERVICE_BASE_URL=http://reporting-service:8085
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - INTERNAL_SERVICE_SHARED_SECRET=${INTERNAL_SERVICE_SHARED_SECRET}
      - JWT_ALGORITHM=HS256
      - AUTH_SERVICE_URL=${AUTH_SERVICE_URL:-http://auth-service:8090}
      - DASHBOARD_STREAM_HEARTBEAT_SECONDS=5
      - DASHBOARD_STREAM_QUEUE_SIZE=64
      - DASHBOARD_STREAM_SEND_TIMEOUT_SECONDS=10
      - DASHBOARD_SNAPSHOT_STALE_AFTER_SECONDS=15
      - DASHBOARD_SCHEDULER_MAX_DRIFT_SECONDS=10
      - DASHBOARD_RECONCILE_INTERVAL_SECONDS=60
      - REDIS_URL=redis://:${REDIS_PASSWORD:-}@redis:6379/0
      - FLEET_STREAM_REDIS_CHANNEL=factoryops:fleet_stream:v1
      - ENERGY_SERVICE_BASE_URL=http://energy-service:8010
      - PROJECTION_BATCH_CHUNK_SIZE=50
      - DEGRADATION_ENABLED=${DEGRADATION_ENABLED:-false}
      - DEGRADATION_FEATURE_WINDOW_INTERVAL_SECONDS=${DEGRADATION_FEATURE_WINDOW_INTERVAL_SECONDS:-3600}
      - DEGRADATION_BASELINE_INTERVAL_SECONDS=${DEGRADATION_BASELINE_INTERVAL_SECONDS:-7200}
      - DEGRADATION_SCORING_INTERVAL_SECONDS=${DEGRADATION_SCORING_INTERVAL_SECONDS:-1800}
      - DEGRADATION_RETENTION_DAYS=${DEGRADATION_RETENTION_DAYS:-90}
      - DEGRADATION_CLEANUP_INTERVAL_SECONDS=${DEGRADATION_CLEANUP_INTERVAL_SECONDS:-7200}
      - DEGRADATION_STALE_THRESHOLD_MINUTES=${DEGRADATION_STALE_THRESHOLD_MINUTES:-60}
      - ANOMALY_ENABLED=${ANOMALY_ENABLED:-false}
      - ANOMALY_DETECTION_INTERVAL_SECONDS=${ANOMALY_DETECTION_INTERVAL_SECONDS:-1800}
      - ANOMALY_BASELINE_INTERVAL_SECONDS=${ANOMALY_BASELINE_INTERVAL_SECONDS:-7200}
      - ANOMALY_DAILY_AGGREGATION_INTERVAL_SECONDS=${ANOMALY_DAILY_AGGREGATION_INTERVAL_SECONDS:-3600}
      - ANOMALY_WEEKLY_AGGREGATION_INTERVAL_SECONDS=${ANOMALY_WEEKLY_AGGREGATION_INTERVAL_SECONDS:-21600}
      - ANOMALY_RETENTION_DAYS=${ANOMALY_RETENTION_DAYS:-90}
      - ANOMALY_CLEANUP_INTERVAL_SECONDS=${ANOMALY_CLEANUP_INTERVAL_SECONDS:-7200}
      - ANOMALY_MAX_OPEN_EVENT_AGE_HOURS=${ANOMALY_MAX_OPEN_EVENT_AGE_HOURS:-24}
      - SNAPSHOT_STORAGE_BACKEND=${SNAPSHOT_STORAGE_BACKEND:-auto}
      - SNAPSHOT_MINIO_BUCKET=${SNAPSHOT_MINIO_BUCKET:-dashboard-snapshots}
      - SNAPSHOT_MINIO_ENDPOINT=${SNAPSHOT_MINIO_ENDPOINT:-}
      - SNAPSHOT_MINIO_ACCESS_KEY=${SNAPSHOT_MINIO_ACCESS_KEY:-}
      - SNAPSHOT_MINIO_SECRET_KEY=${SNAPSHOT_MINIO_SECRET_KEY:-}
      - SNAPSHOT_MINIO_SECURE=${SNAPSHOT_MINIO_SECURE:-false}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-}
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-}
    expose:
      - "8000"
    ports:
      - "${DEVICE_SERVICE_HOST_BIND:-127.0.0.1}:${DEVICE_SERVICE_HOST_PORT:-8000}:8000"
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    networks:
      - energy-net
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  device-service-scheduler:
    image: ghcr.io/${GHCR_OWNER_LOWER:-cittagent}/${GHCR_REPO_LOWER:-shivex-main-1}-device-service:${DEVICE_SERVICE_IMAGE_TAG:-${APP_IMAGE_TAG:-main}}
    container_name: device-service-scheduler
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - LOG_LEVEL=INFO
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - DEVICE_SERVICE_RUNTIME=scheduler
      - DEVICE_SERVICE_ENABLE_FLEET_STREAM=false
      - DEVICE_SERVICE_RUN_STARTUP_MAINTENANCE=true
      - DEVICE_SERVICE_RUN_EMBEDDED_SCHEDULERS=true
      - DATA_SERVICE_BASE_URL=http://data-service:8081
      - RULE_ENGINE_SERVICE_BASE_URL=http://rule-engine-service:8002
      - REPORTING_SERVICE_BASE_URL=http://reporting-service:8085
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - INTERNAL_SERVICE_SHARED_SECRET=${INTERNAL_SERVICE_SHARED_SECRET}
      - JWT_ALGORITHM=HS256
      - AUTH_SERVICE_URL=${AUTH_SERVICE_URL:-http://auth-service:8090}
      - DASHBOARD_STREAM_HEARTBEAT_SECONDS=5
      - DASHBOARD_STREAM_QUEUE_SIZE=64
      - DASHBOARD_STREAM_SEND_TIMEOUT_SECONDS=10
      - DASHBOARD_SNAPSHOT_STALE_AFTER_SECONDS=15
      - DASHBOARD_SCHEDULER_MAX_DRIFT_SECONDS=10
      - DASHBOARD_RECONCILE_INTERVAL_SECONDS=60
      - REDIS_URL=redis://:${REDIS_PASSWORD:-}@redis:6379/0
      - FLEET_STREAM_REDIS_CHANNEL=factoryops:fleet_stream:v1
      - ENERGY_SERVICE_BASE_URL=http://energy-service:8010
      - PROJECTION_BATCH_CHUNK_SIZE=50
      - DEGRADATION_ENABLED=${DEGRADATION_ENABLED:-false}
      - DEGRADATION_FEATURE_WINDOW_INTERVAL_SECONDS=${DEGRADATION_FEATURE_WINDOW_INTERVAL_SECONDS:-3600}
      - DEGRADATION_BASELINE_INTERVAL_SECONDS=${DEGRADATION_BASELINE_INTERVAL_SECONDS:-7200}
      - DEGRADATION_SCORING_INTERVAL_SECONDS=${DEGRADATION_SCORING_INTERVAL_SECONDS:-1800}
      - DEGRADATION_RETENTION_DAYS=${DEGRADATION_RETENTION_DAYS:-90}
      - DEGRADATION_CLEANUP_INTERVAL_SECONDS=${DEGRADATION_CLEANUP_INTERVAL_SECONDS:-7200}
      - DEGRADATION_STALE_THRESHOLD_MINUTES=${DEGRADATION_STALE_THRESHOLD_MINUTES:-60}
      - ANOMALY_ENABLED=${ANOMALY_ENABLED:-false}
      - ANOMALY_DETECTION_INTERVAL_SECONDS=${ANOMALY_DETECTION_INTERVAL_SECONDS:-1800}
      - ANOMALY_BASELINE_INTERVAL_SECONDS=${ANOMALY_BASELINE_INTERVAL_SECONDS:-7200}
      - ANOMALY_DAILY_AGGREGATION_INTERVAL_SECONDS=${ANOMALY_DAILY_AGGREGATION_INTERVAL_SECONDS:-3600}
      - ANOMALY_WEEKLY_AGGREGATION_INTERVAL_SECONDS=${ANOMALY_WEEKLY_AGGREGATION_INTERVAL_SECONDS:-21600}
      - ANOMALY_RETENTION_DAYS=${ANOMALY_RETENTION_DAYS:-90}
      - ANOMALY_CLEANUP_INTERVAL_SECONDS=${ANOMALY_CLEANUP_INTERVAL_SECONDS:-7200}
      - ANOMALY_MAX_OPEN_EVENT_AGE_HOURS=${ANOMALY_MAX_OPEN_EVENT_AGE_HOURS:-24}
      - SNAPSHOT_STORAGE_BACKEND=${SNAPSHOT_STORAGE_BACKEND:-auto}
      - SNAPSHOT_MINIO_BUCKET=${SNAPSHOT_MINIO_BUCKET:-dashboard-snapshots}
      - SNAPSHOT_MINIO_ENDPOINT=${SNAPSHOT_MINIO_ENDPOINT:-}
      - SNAPSHOT_MINIO_ACCESS_KEY=${SNAPSHOT_MINIO_ACCESS_KEY:-}
      - SNAPSHOT_MINIO_SECRET_KEY=${SNAPSHOT_MINIO_SECRET_KEY:-}
      - SNAPSHOT_MINIO_SECURE=${SNAPSHOT_MINIO_SECURE:-false}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-}
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-}
    depends_on:
      redis:
        condition: service_healthy
      device-service:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "python", "-c", "from pathlib import Path; import sys; sys.exit(0 if 'app.scheduler_runner' in Path('/proc/1/cmdline').read_text().replace('\\x00', ' ') else 1)"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    networks:
      - energy-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  energy-service:
    image: ghcr.io/${GHCR_OWNER_LOWER:-cittagent}/${GHCR_REPO_LOWER:-shivex-main-1}-energy-service:${ENERGY_SERVICE_IMAGE_TAG:-${APP_IMAGE_TAG:-main}}
    container_name: energy-service
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - UVICORN_WORKERS=${ENERGY_SERVICE_UVICORN_WORKERS:-1}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-}@redis:6379/0
      - ENERGY_STREAM_REDIS_CHANNEL=factoryops:energy_stream:v1
      - REPORTING_SERVICE_BASE_URL=http://reporting-service:8085
      - DEVICE_SERVICE_BASE_URL=http://device-service:8000
      - ENERGY_BATCH_CHUNK_SIZE=120
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - INTERNAL_SERVICE_SHARED_SECRET=${INTERNAL_SERVICE_SHARED_SECRET}
      - JWT_ALGORITHM=HS256
      - AUTH_SERVICE_URL=${AUTH_SERVICE_URL:-http://auth-service:8090}
    expose:
      - "8010"
    depends_on:
      redis:
        condition: service_healthy
      device-service:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    networks:
      - energy-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  data-service:
    image: ghcr.io/${GHCR_OWNER_LOWER:-cittagent}/${GHCR_REPO_LOWER:-shivex-main-1}-data-service:${DATA_SERVICE_IMAGE_TAG:-${APP_IMAGE_TAG:-main}}
    container_name: data-service
    restart: unless-stopped
    environment:
      - APP_ROLE=api
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-}@redis:6379/0
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - LOG_LEVEL=INFO
      - PORT=8081
      - HOST=0.0.0.0
      - MQTT_BROKER_HOST=emqx
      - MQTT_BROKER_PORT=1883
      - MQTT_USERNAME=${MQTT_USERNAME:-internal:data-service}
      - MQTT_PASSWORD=${MQTT_PASSWORD:-local-dev-data-service-password}
      - MQTT_TOPIC=devices/+/telemetry
      - MQTT_CLEAN_SESSION=true
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=energy-token
      - INFLUXDB_ORG=energy-org
      - INFLUXDB_BUCKET=telemetry
      - DEVICE_SERVICE_URL=http://device-service:8000
      - ENERGY_SERVICE_URL=http://energy-service:8010
      - ENERGY_SYNC_ENABLED=true
      - RULE_ENGINE_URL=http://rule-engine-service:8002
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - INTERNAL_SERVICE_SHARED_SECRET=${INTERNAL_SERVICE_SHARED_SECRET}
      - JWT_ALGORITHM=HS256
      - AUTH_SERVICE_URL=${AUTH_SERVICE_URL:-http://auth-service:8090}
      - FRONTEND_BASE_URL=${FRONTEND_BASE_URL:-}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://shivex.ai}
      - EXTERNAL_URL=${EXTERNAL_URL:-}
      - DATA_ALLOWED_ORIGINS=${DATA_ALLOWED_ORIGINS:-}
      - MYSQL_HOST=${MYSQL_HOST}
      - MYSQL_PORT=${MYSQL_PORT}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - DB_POOL_SIZE=${DATA_SERVICE_DB_POOL_SIZE:-5}
      - DB_MAX_OVERFLOW=${DATA_SERVICE_DB_MAX_OVERFLOW:-10}
      - DB_POOL_RECYCLE=${DATA_SERVICE_DB_POOL_RECYCLE:-3600}
      - DB_POOL_TIMEOUT=${DATA_SERVICE_DB_POOL_TIMEOUT:-30}
      - DLQ_BACKEND=mysql
      - DEVICE_SYNC_ENABLED=true
      - DEVICE_SYNC_WORKERS=2
      - TELEMETRY_WORKER_CONSUMER_NAME=data-telemetry-api
      - TELEMETRY_INGEST_STREAM_NAME=telemetry_ingest_stream
      - TELEMETRY_PROJECTION_STREAM_NAME=telemetry_projection_stream
      - TELEMETRY_BROADCAST_STREAM_NAME=telemetry_broadcast_stream
      - TELEMETRY_ENERGY_STREAM_NAME=telemetry_energy_stream
      - TELEMETRY_RULES_STREAM_NAME=telemetry_rules_stream
      - TELEMETRY_DEAD_LETTER_STREAM_NAME=telemetry_dead_letter_stream
      - TELEMETRY_INGEST_STREAM_MAXLEN=250000
      - TELEMETRY_PROJECTION_STREAM_MAXLEN=250000
      - TELEMETRY_BROADCAST_STREAM_MAXLEN=250000
      - TELEMETRY_ENERGY_STREAM_MAXLEN=250000
      - TELEMETRY_RULES_STREAM_MAXLEN=250000
      - TELEMETRY_INGEST_REJECT_THRESHOLD=200000
      - TELEMETRY_PROJECTION_BACKLOG_THRESHOLD=200000
      - TELEMETRY_BROADCAST_BACKLOG_THRESHOLD=200000
      - TELEMETRY_ENERGY_BACKLOG_THRESHOLD=200000
      - TELEMETRY_RULES_BACKLOG_THRESHOLD=200000
      - OUTBOX_POLL_INTERVAL_SEC=0.5
      - OUTBOX_BATCH_SIZE=500
      - OUTBOX_ENERGY_DELIVERY_BATCH_SIZE=100
      - OUTBOX_MAX_BATCHES_PER_RUN=8
      - OUTBOX_HTTP_TIMEOUT_SECONDS=8
      - OUTBOX_HTTP_MAX_KEEPALIVE_CONNECTIONS=60
      - OUTBOX_HTTP_MAX_CONNECTIONS=200
      - OUTBOX_MAX_RETRIES=5
      - OUTBOX_RETRY_BACKOFF_BASE_SECONDS=5
      - OUTBOX_DEVICE_CONFIG_CACHE_TTL_SECONDS=300
      - OUTBOX_CIRCUIT_BREAKER_HALF_OPEN_MAX_CALLS=3
      - TELEMETRY_HEALTH_LAG_WARN_SECONDS=30
      - TELEMETRY_HEALTH_LAG_OVERLOAD_SECONDS=90
      - TELEMETRY_PROJECTION_OVERLOAD_THRESHOLD=20000
      - TELEMETRY_PROJECTION_OVERLOAD_MAX_DEFERS=40
      - TELEMETRY_PROJECTION_DEFER_BASE_SECONDS=0.25
      - TELEMETRY_PROJECTION_DEFER_MAX_SECONDS=8
      - TELEMETRY_ENERGY_OVERLOAD_THRESHOLD=5000
      - TELEMETRY_RULES_OVERLOAD_THRESHOLD=10000
      - DEVICE_PROJECTION_TRANSPORT_RETRIES=3
      - DEVICE_PROJECTION_RETRY_BACKOFF_BASE_SECONDS=0.2
      - DEVICE_PROJECTION_RETRY_BACKOFF_MAX_SECONDS=2.0
      - DEVICE_PROJECTION_MAX_INFLIGHT_REQUESTS=12
      - CIRCUIT_BREAKER_FAILURE_THRESHOLD=10
      - DEVICE_PROJECTION_HTTP_MAX_KEEPALIVE_CONNECTIONS=80
      - DEVICE_PROJECTION_HTTP_MAX_CONNECTIONS=200
      - DEVICE_PROJECTION_HTTP_POOL_TIMEOUT_SECONDS=1.0
      - OUTBOX_PENDING_WARN_THRESHOLD=2000
      - OUTBOX_PENDING_OVERLOAD_THRESHOLD=10000
      - DLQ_RETRY_BATCH_LIMIT=100
      - DLQ_RETRY_BASE_BACKOFF_SECONDS=60
      - DLQ_RETRY_MAX_BACKOFF_SECONDS=300
      - RECONCILIATION_INTERVAL_SEC=300
      - RECONCILIATION_DRIFT_WARN_MINUTES=10
      - RECONCILIATION_DRIFT_RESYNC_MINUTES=30
    expose:
      - "8081"
    ports:
      - "${DATA_SERVICE_HOST_BIND:-127.0.0.1}:${DATA_SERVICE_HOST_PORT:-8081}:8081"
    depends_on:
      influxdb:
        condition: service_healthy
      emqx:
        condition: service_healthy
      emqx-auth-bootstrap:
        condition: service_completed_successfully
      device-service:
        condition: service_healthy
      energy-service:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    networks:
      - energy-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
